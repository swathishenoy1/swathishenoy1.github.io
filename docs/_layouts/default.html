<!doctype html>
<html lang="{{ site.lang | default: "en" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} · {{ site.title }}</title>
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
    <script>
      (function () {
        var root = document.documentElement;
        try {
          var saved = localStorage.getItem("theme");
          if (saved) {
            root.setAttribute("data-theme", saved);
            return;
          }
        } catch (e) {}
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
          root.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body data-theme="dark">
    <div class="page">
      <aside class="sidebar">
        <div class="profile">
          <img class="avatar" src="{{ site.author.avatar | relative_url }}" alt="{{ site.author.name }}">
          <h1 class="name">{{ site.author.name }}</h1>
          <p class="role">{{ site.author.role }}</p>
          <p class="bio">{{ site.author.bio }}</p>
          <p class="location">{{ site.author.location }}</p>
          <div class="links">
            {% for link in site.author.links %}
              <a href="{{ link.url }}">{{ link.label }}</a>
            {% endfor %}
          </div>
        </div>
      </aside>

      <main class="content">
        <header class="site-header">
          <div>
            <div class="site-description">{{ site.description }}</div>
          </div>
          <nav class="site-nav">
            <a href="{{ "/" | relative_url }}">Home</a>
            <div class="search">
              <input class="search__input" type="search" placeholder="Search articles" aria-label="Search articles">
            </div>
            <button class="theme-toggle" type="button" aria-label="Toggle theme">
              <span class="theme-toggle__icon" aria-hidden="true">☾</span>
              <span class="theme-toggle__label">Theme</span>
            </button>
          </nav>
        </header>

        <article class="page-content">
          {{ content }}
        </article>
      </main>
    </div>
    <script>
      (function () {
        var root = document.body || document.documentElement;
        var toggle = document.querySelector(".theme-toggle");
        var icon = document.querySelector(".theme-toggle__icon");
        if (!toggle || !icon) return;

        function setTheme(theme) {
          root.setAttribute("data-theme", theme);
          document.documentElement.setAttribute("data-theme", theme);
          try {
            localStorage.setItem("theme", theme);
          } catch (e) {}
          icon.textContent = theme === "light" ? "☀" : "☾";
        }

        var current = root.getAttribute("data-theme") ||
          document.documentElement.getAttribute("data-theme") ||
          "dark";
        setTheme(current);

        toggle.addEventListener("click", function () {
          var next = (root.getAttribute("data-theme") || "dark") === "dark" ? "light" : "dark";
          setTheme(next);
        });
      })();
    </script>
    <script>
      (function () {
        var input = document.querySelector(".search__input");
        var list = document.querySelector(".post-list");
        if (!input || !list) return;

        var cards = Array.prototype.slice.call(list.querySelectorAll(".post-card"));

        function normalize(text) {
          return (text || "").toLowerCase();
        }

        input.addEventListener("input", function () {
          var q = normalize(input.value);
          cards.forEach(function (card) {
            var text = normalize(card.textContent);
            card.style.display = text.indexOf(q) !== -1 ? "" : "none";
          });
        });

        input.addEventListener("keydown", function (event) {
          if (event.key === "Escape") {
            input.value = "";
            input.dispatchEvent(new Event("input"));
          }
        });
      })();
    </script>
  </body>
</html>
